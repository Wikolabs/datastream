version: "3.9"

# datastream demo — production-ready POC.
# 2 services orchestrated:
#   - datastream (Next.js frontend on host port 3018)
#   - datastream-backend (FastAPI Python, internal only on 8000)
# Internal network so the frontend can reach the backend by service name.

services:
  datastream-backend:
    image: ghcr.io/wikolabs/datastream-backend:latest
    container_name: datastream-backend
    restart: unless-stopped
    environment:
      GROQ_API_KEY: ${GROQ_API_KEY:-}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
    networks:
      - datastream-net

  datastream:
    image: ghcr.io/wikolabs/datastream:latest
    container_name: datastream
    restart: unless-stopped
    ports:
      - "3018:3000"
    environment:
      BACKEND_URL: "http://datastream-backend:8000"
    depends_on:
      - datastream-backend
    networks:
      - datastream-net

networks:
  datastream-net:
    name: datastream-net
    driver: bridge